name: Threat Intelligence Auto-Update

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  update-threat-intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or default GITHUB_TOKEN; token must have write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Tier 1: Update IOC JSON ──────────────────────────────────────────────
      - name: Update threat intelligence (IOC JSON)
        id: ioc_update
        run: |
          chmod +x skills/secureclaw/skill/scripts/update-threat-intel.py
          DRY=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            DRY="--dry-run"
          fi
          python3 skills/secureclaw/skill/scripts/update-threat-intel.py $DRY \
            skills/secureclaw/skill/configs/supply-chain-ioc.json
          echo "changed=$(git diff --name-only skills/secureclaw/skill/configs/supply-chain-ioc.json | grep -q . && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # ── Tier 2: Update YARA rules ────────────────────────────────────────────
      - name: Update YARA rules
        id: yara_update
        run: |
          DRY=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            DRY="--dry-run"
          fi
          python3 skills/secureclaw/skill/scripts/update-yara-rules.py $DRY \
            skills/secureclaw/skill/rules/supply-chain.yar
          echo "changed=$(git diff --name-only skills/secureclaw/skill/rules/supply-chain.yar | grep -q . && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # ── Syntax-validate YARA after update ───────────────────────────────────
      - name: Validate YARA syntax
        if: steps.yara_update.outputs.changed == 'true'
        run: |
          pip install yara-python --quiet
          python3 -c "
          import yara, sys
          try:
              yara.compile('skills/secureclaw/skill/rules/supply-chain.yar')
              print('YARA syntax OK')
          except yara.SyntaxError as e:
              print(f'YARA syntax ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          "

      # ── Commit and open PR if any changes ───────────────────────────────────
      - name: Commit updates
        if: |
          steps.ioc_update.outputs.changed == 'true' ||
          steps.yara_update.outputs.changed == 'true'
        run: |
          git config user.name  "SkillGate Bot"
          git config user.email "skillgate-bot@users.noreply.github.com"

          TODAY=$(date -u +"%Y-%m-%d")
          BRANCH="threat-intel/auto-update-${TODAY}"

          git checkout -b "$BRANCH"
          git add \
            skills/secureclaw/skill/configs/supply-chain-ioc.json \
            skills/secureclaw/skill/rules/supply-chain.yar
          git commit -m "chore(threat-intel): auto-update IOC and YARA rules ${TODAY}

          Sources:
          - Feodo Tracker (abuse.ch): C2 IP blocklist
          - URLhaus (abuse.ch): malicious domain feed
          - OSSF malicious-packages: PyPI / npm malicious package names
          - YARA-Rules/rules: community supply-chain rules

          Auto-generated by github-actions-threat-intel-update workflow."
          git push origin "$BRANCH"

      - name: Create pull request
        if: |
          steps.ioc_update.outputs.changed == 'true' ||
          steps.yara_update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          BRANCH="threat-intel/auto-update-${TODAY}"
          gh pr create \
            --title "chore(threat-intel): auto-update IOC + YARA rules ${TODAY}" \
            --body "## Automated Threat Intelligence Update

          This PR was auto-generated by the daily threat intel update workflow.

          ### Changes
          - **supply-chain-ioc.json**: new C2 IPs, malicious domains, malicious package names
          - **supply-chain.yar**: new YARA rules from community repos

          ### Sources
          - [Feodo Tracker](https://feodotracker.abuse.ch/) — C2 IP blocklist
          - [URLhaus](https://urlhaus.abuse.ch/) — malicious URL/domain feed
          - [OSSF Malicious Packages](https://github.com/ossf/malicious-packages) — PyPI/npm
          - [YARA-Rules/rules](https://github.com/Yara-Rules/rules) — community YARA rules

          ### Review checklist
          - [ ] C2 IPs look reasonable (no false positives)
          - [ ] New YARA rules pass syntax check (automated above)
          - [ ] Malicious package names don't include popular legitimate packages
          " \
            --head "$BRANCH" \
            --base main \
            --label "threat-intel,automated"

  # ── Separate job: false-positive test on updated rules ──────────────────────
  false-positive-test:
    runs-on: ubuntu-latest
    needs: update-threat-intel
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run false-positive test suite against known-clean skills
        run: |
          python3 -c "
          import tempfile, os, sys, pathlib

          clean_samples = [
              ('hello.py',  'print(\"Hello, world!\")'),
              ('add.py',    'def add(a, b):\n    return a + b\n'),
              ('config.py', 'DB_HOST = \"localhost\"\nDB_PORT = 5432\n'),
              ('index.js',  'module.exports = function greet(name) { return \"Hello \" + name; }'),
          ]

          scripts = [
              ('policy_check.py',            'skills/healthcheck/scripts/policy_check.py'),
              ('check-dangerous-commands.py','skills/secureclaw/skill/scripts/check-dangerous-commands.py'),
              ('check-ioc.py',               'skills/secureclaw/skill/scripts/check-ioc.py'),
          ]

          fail = 0
          with tempfile.TemporaryDirectory() as d:
              for fname, content in clean_samples:
                  pathlib.Path(d, fname).write_text(content)

              for label, script in scripts:
                  ret = os.system(f'python3 {script} {d} clean-skill > /dev/null 2>&1')
                  code = ret >> 8
                  if code == 1:
                      print(f'FALSE POSITIVE: {label} incorrectly BLOCKED clean code', file=sys.stderr)
                      fail += 1
                  else:
                      print(f'OK: {label} passed clean code (exit={code})')

          sys.exit(fail)
          "
